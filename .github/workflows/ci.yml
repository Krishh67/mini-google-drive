name: Flask CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Get the code from the GitHub repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up a Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # You can change this to match your local version

    # Step 3: Install all dependencies listed in requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run a basic check
    # Instead of complex tests, we just check if the app.py file has valid Python syntax
    - name: Check Python Syntax
      run: |
        python -m py_compile app.py

    # Step 5: Build Docker Image
    - name: Build Docker Image
      run: docker build -t flask-file-sharing:latest .
